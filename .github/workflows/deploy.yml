name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race the same box.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package build artifact
        run: tar -czf deploy.tar.gz dist package.json package-lock.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship artifact to VPS
        run: |
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes deploy.tar.gz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/fpa-ci.tar.gz"

      - name: Deploy + restart on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              set -e
              cd /opt/flash-props-api
              rm -rf dist
              tar xzf /tmp/fpa-ci.tar.gz
              npm install --omit=dev --no-audit --no-fund
              pm2 restart flash-props-api --update-env
              rm -f /tmp/fpa-ci.tar.gz
              sleep 2
              code=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:3862/health)
              echo "post-deploy health: $code"
              test "$code" = "200"
            '
